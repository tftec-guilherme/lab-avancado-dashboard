# ============================================================
# CI/CD — Lab Avancado: Retail Operations Dashboard
# ============================================================
# Deploy completo: App Service + Azure Functions + SQL Database seed
#
# Jobs:
#   1. validate:         sintaxe JS/TS + build React
#   2. deploy-app:       deploy App Service (Express API + React)
#   3. deploy-functions: deploy Azure Functions (13 functions)
#   4. seed-db:          schema + 12 produtos no SQL Database
#
# Secrets necessarios:
#   AZURE_CLIENT_ID                — appId do Service Principal
#   AZURE_CLIENT_SECRET            — password do Service Principal
#   AZURE_TENANT_ID                — tenant do Service Principal
#   AZURE_SUBSCRIPTION_ID          — ID da subscription Azure
#   LAB_AVANCADO_APP_NAME          — Nome do App Service
#   LAB_AVANCADO_FUNCTIONAPP_NAME  — Nome do Function App
#   LAB_AVANCADO_SQL_SERVER        — FQDN do SQL Server
#   LAB_AVANCADO_SQL_DATABASE      — Nome do banco
#   LAB_AVANCADO_SQL_USER          — Usuario admin
#   LAB_AVANCADO_SQL_PASSWORD      — Senha
# ============================================================

name: "Deploy Lab Avancado"

on:
  workflow_dispatch:
    inputs:
      seed_database:
        description: "Executar seed do banco de dados?"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      deploy_functions:
        description: "Deploy das Azure Functions?"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

env:
  NODE_VERSION: "20"

# ─── Job 1: Validate ──────────────────────────────────────
jobs:
  validate:
    name: "Validate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar dependencias (Dashboard)
        run: npm install
        working-directory: dashboard

      - name: Verificar sintaxe JS (server)
        run: find server scripts -name "*.js" -exec node --check {} +
        working-directory: dashboard

      - name: Build React
        run: npm run build
        working-directory: dashboard

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dashboard/dist
          retention-days: 1

      - name: Instalar dependencias (Functions)
        run: npm install
        working-directory: functions

      - name: Verificar sintaxe JS (Functions)
        run: find src -name "*.js" -exec node --check {} +
        working-directory: functions

  # ─── Job 2: Deploy App Service ─────────────────────────────
  deploy-app:
    name: "Deploy App Service"
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dashboard/dist

      - name: Preparar pacote de deploy
        run: |
          mkdir -p deploy-package
          cp -r server/ deploy-package/server/
          cp -r dist/ deploy-package/dist/
          cp -r sql/ deploy-package/sql/
          cp -r scripts/ deploy-package/scripts/
          cp package.json deploy-package/
          cp package-lock.json deploy-package/ 2>/dev/null || true
          cd deploy-package && npm install --omit=dev
          cd .. && cd deploy-package && zip -r ../deploy.zip .
        working-directory: dashboard

      - name: Login no Azure
        run: |
          az login --service-principal \
            -u "${{ secrets.AZURE_CLIENT_ID }}" \
            -p "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Remover WEBSITE_RUN_FROM_PACKAGE se existir
        run: |
          az webapp config appsettings delete \
            --name ${{ secrets.LAB_AVANCADO_APP_NAME }} \
            --resource-group rg-lab-avancado \
            --setting-names WEBSITE_RUN_FROM_PACKAGE 2>/dev/null || true

      - name: Configurar App Settings
        run: |
          az webapp config appsettings set \
            --name ${{ secrets.LAB_AVANCADO_APP_NAME }} \
            --resource-group rg-lab-avancado \
            --settings \
              NODE_ENV=production \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              SQL_SERVER=${{ secrets.LAB_AVANCADO_SQL_SERVER }} \
              SQL_DATABASE=${{ secrets.LAB_AVANCADO_SQL_DATABASE }} \
              SQL_USER=${{ secrets.LAB_AVANCADO_SQL_USER }} \
              SQL_PASSWORD=${{ secrets.LAB_AVANCADO_SQL_PASSWORD }}

      - name: Configurar startup command
        run: |
          az webapp config set \
            --name ${{ secrets.LAB_AVANCADO_APP_NAME }} \
            --resource-group rg-lab-avancado \
            --startup-file "node server/index.js"

      - name: Deploy para App Service
        run: |
          az webapp deploy \
            --name ${{ secrets.LAB_AVANCADO_APP_NAME }} \
            --resource-group rg-lab-avancado \
            --src-path dashboard/deploy.zip \
            --type zip

  # ─── Job 3: Deploy Azure Functions ─────────────────────────
  deploy-functions:
    name: "Deploy Azure Functions"
    runs-on: ubuntu-latest
    needs: validate
    if: |
      github.event.inputs.deploy_functions == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar dependencias
        run: npm install --production
        working-directory: functions

      - name: Login no Azure
        run: |
          az login --service-principal \
            -u "${{ secrets.AZURE_CLIENT_ID }}" \
            -p "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Deploy para Azure Functions
        run: |
          cd functions && zip -r ../functions.zip . && cd ..
          az functionapp deployment source config-zip \
            --name ${{ secrets.LAB_AVANCADO_FUNCTIONAPP_NAME }} \
            --resource-group rg-lab-avancado \
            --src functions.zip

      - name: Configurar APP_CALLBACK_URL no Function App
        run: |
          az functionapp config appsettings set \
            --name ${{ secrets.LAB_AVANCADO_FUNCTIONAPP_NAME }} \
            --resource-group rg-lab-avancado \
            --settings \
              APP_CALLBACK_URL=https://${{ secrets.LAB_AVANCADO_APP_NAME }}.azurewebsites.net

      - name: Configurar APIM policy (roteamento para Function App)
        run: |
          # Descobre o nome do APIM no resource group
          APIM_NAME=$(az apim list --resource-group rg-lab-avancado --query "[0].name" -o tsv 2>/dev/null)
          if [ -z "$APIM_NAME" ]; then
            echo "APIM nao encontrado — pulando configuracao de policy"
            exit 0
          fi

          # Descobre o API ID
          API_ID=$(az apim api list --resource-group rg-lab-avancado --service-name "$APIM_NAME" --query "[0].name" -o tsv 2>/dev/null)
          if [ -z "$API_ID" ]; then
            echo "API nao encontrada no APIM — pulando"
            exit 0
          fi

          # Configura a policy com set-backend-service + rewrite-uri
          FUNC_URL="https://${{ secrets.LAB_AVANCADO_FUNCTIONAPP_NAME }}.azurewebsites.net"
          SUBSCRIPTION_ID=$(az account show --query id -o tsv)

          POLICY_XML="<policies><inbound><base /><set-backend-service base-url=\"${FUNC_URL}\" /><rewrite-uri template=\"/api/orders\" /><rate-limit calls=\"60\" renewal-period=\"60\" /></inbound><backend><forward-request /></backend><outbound><base /></outbound><on-error><base /></on-error></policies>"

          # Descobre o operation ID
          OP_ID=$(az apim api operation list --resource-group rg-lab-avancado --service-name "$APIM_NAME" --api-id "$API_ID" --query "[0].name" -o tsv 2>/dev/null)

          if [ -n "$OP_ID" ]; then
            # Aplica policy na operacao
            az rest --method put \
              --uri "https://management.azure.com/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/rg-lab-avancado/providers/Microsoft.ApiManagement/service/${APIM_NAME}/apis/${API_ID}/operations/${OP_ID}/policies/policy?api-version=2023-05-01-preview" \
              --headers "Content-Type=application/json" \
              --body "{\"properties\":{\"format\":\"xml\",\"value\":\"${POLICY_XML}\"}}" \
              --output none 2>/dev/null || true
            echo "Policy APIM configurada: ${APIM_NAME}/${API_ID}/${OP_ID}"
          else
            echo "Operacao nao encontrada no APIM — pulando policy"
          fi

  # ─── Job 4: Seed Database ──────────────────────────────────
  seed-db:
    name: "Seed SQL Database"
    runs-on: ubuntu-latest
    needs: validate
    if: |
      github.event.inputs.seed_database == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar dependencia mssql
        run: npm install mssql dotenv
        working-directory: dashboard

      - name: Login no Azure
        run: |
          az login --service-principal \
            -u "${{ secrets.AZURE_CLIENT_ID }}" \
            -p "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Liberar IP do runner no firewall
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          SQL_SERVER_NAME=$(echo "${{ secrets.LAB_AVANCADO_SQL_SERVER }}" | sed 's/.database.windows.net//')
          az sql server firewall-rule create \
            --resource-group rg-lab-avancado \
            --server "$SQL_SERVER_NAME" \
            --name "github-actions-runner" \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP"

      - name: Executar seed
        run: node scripts/init-db.js
        working-directory: dashboard
        env:
          SQL_SERVER: ${{ secrets.LAB_AVANCADO_SQL_SERVER }}
          SQL_DATABASE: ${{ secrets.LAB_AVANCADO_SQL_DATABASE }}
          SQL_USER: ${{ secrets.LAB_AVANCADO_SQL_USER }}
          SQL_PASSWORD: ${{ secrets.LAB_AVANCADO_SQL_PASSWORD }}

      - name: Remover IP do runner do firewall
        if: always()
        run: |
          SQL_SERVER_NAME=$(echo "${{ secrets.LAB_AVANCADO_SQL_SERVER }}" | sed 's/.database.windows.net//')
          az sql server firewall-rule delete \
            --resource-group rg-lab-avancado \
            --server "$SQL_SERVER_NAME" \
            --name "github-actions-runner" \
            --yes 2>/dev/null || true
